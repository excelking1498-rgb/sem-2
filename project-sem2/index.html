<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Spotify</h2>

        <ul>
            <li>🏠 Home</li>
            <li>🔍 Search</li>
            <li>📚 Your Library</li>
        </ul>

        <h3>Playlists</h3>
        <ul>
            <li>Liked Songs</li>
            <li>Workout Mix</li>
            <li>Chill Vibes</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <header>
            <h1>Good Evening</h1>
        </header>

        <div class="cards">

            <div class="card">
                <img src="https://picsum.photos/200?1" alt="">
                <h3>Top Hits</h3>
                <p>Best songs of 2026</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?2" alt="">
                <h3>Workout</h3>
                <p>Gym motivation playlist</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?3" alt="">
                <h3>Relax</h3>
                <p>Peaceful music</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/200?4" alt="">
                <h3>Focus</h3>
                <p>Study playlist</p>
            </div>

        </div>

    </div>

</div>

<!-- Music Player -->
<div class="player">

    <div class="song-info">
        <h4>Sample Song</h4>
        <p>Artist Name</p>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playPause()" id="playBtn">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
